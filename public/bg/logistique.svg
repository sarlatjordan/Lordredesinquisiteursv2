<svg viewBox="0 0 1440 900" xmlns="http://www.w3.org/2000/svg">
<defs>
  <radialGradient id="bg" cx="50%" cy="100%" r="90%">
    <stop offset="0%" stop-color="#110d04"/>
    <stop offset="100%" stop-color="#050402"/>
  </radialGradient>
  <radialGradient id="lamp1" cx="22%" cy="0%" r="38%">
    <stop offset="0%" stop-color="#f59e0b" stop-opacity=".28"/>
    <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="lamp2" cx="78%" cy="0%" r="38%">
