<svg viewBox="0 0 1440 900" xmlns="http://www.w3.org/2000/svg">
<defs>
  <radialGradient id="bg" cx="50%" cy="50%" r="80%">
    <stop offset="0%" stop-color="#0d0b05"/>
    <stop offset="100%" stop-color="#040301"/>
  </radialGradient>
  <radialGradient id="glow" cx="50%" cy="50%" r="55%">
    <stop offset="0%" stop-color="#d97706" stop-opacity=".15"/>
    <stop offset="100%" stop-color="#d97706" stop-opacity="0"/>
  </radialGradient>
</defs>
<rect width="1440" height="900" fill="url(#bg)"/>
<rect width="1440" height="900" fill="url(#glow)"/>
<!-- Stars -->
<g fill="white" opacity=".7"><circle cx="72" cy="43" r="1.2"/><circle cx="498" cy="67" r="1.5"/><circle cx="923" cy="55" r="1.3"/><circle cx="1372" cy="48" r="1.1"/><circle cx="177" cy="145" r="1.4"/><circle cx="612" cy="138" r="1.2"/><circle cx="215" cy="28" r=".8"/><circle cx="701" cy="19" r="1"/><circle cx="1148" cy="33" r=".9"/><circle cx="387" cy="88" r="1.3"/><circle cx="842" cy="91" r="1.5"/></g>
<!-- Diplomatic table — perspective ellipse -->
<ellipse cx="720" cy="620" rx="420" ry="80" fill="none" stroke="#d97706" stroke-width="1.2" opacity=".3"/>
<ellipse cx="720" cy="620" rx="380" ry="68" fill="#1a1200" opacity=".4"/>
<!-- Table surface lines -->
<g stroke="#d97706" stroke-width=".5" opacity=".2">
  <line x1="340" y1="600" x2="1100" y2="600"/>
  <line x1="320" y1="620" x2="1120" y2="620"/>
  <line x1="340" y1="640" x2="1100" y2="640"/>
</g>
<!-- Left faction seal -->
<circle cx="300" cy="450" r="90" fill="none" stroke="#d97706" stroke-width="1.2" opacity=".4"/>
<circle cx="300" cy="450" r="70" fill="none" stroke="#d97706" stroke-width=".6" opacity=".25"/>
<circle cx="300" cy="450" r="40" fill="#1a1200" stroke="#d97706" stroke-width="1" opacity=".6"/>
<!-- Left seal interior lines -->
<g stroke="#d97706" stroke-width=".8" opacity=".3">
  <line x1="300" y1="420" x2="300" y2="480"/>
  <line x1="270" y1="450" x2="330" y2="450"/>
  <line x1="279" y1="429" x2="321" y2="471"/>
  <line x1="321" y1="429" x2="279" y2="471"/>
</g>
<!-- Right faction seal -->
<circle cx="1140" cy="450" r="90" fill="none" stroke="#d97706" stroke-width="1.2" opacity=".4"/>
<circle cx="1140" cy="450" r="70" fill="none" stroke="#d97706" stroke-width=".6" opacity=".25"/>
<circle cx="1140" cy="450" r="40" fill="#1a1200" stroke="#d97706" stroke-width="1" opacity=".6"/>
<g stroke="#d97706" stroke-width=".8" opacity=".3">
  <polygon points="1140,418 1166,444 1156,476 1124,476 1114,444"/>
</g>
<!-- Central accord symbol -->
<circle cx="720" cy="450" r="55" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity=".4"/>
<circle cx="720" cy="450" r="35" fill="#1a1200" stroke="#d97706" stroke-width="1" opacity=".7"/>
<!-- Accord handshake stylized -->
<path d="M698,450 Q710,440 720,450 Q730,460 742,450" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity=".6"/>
<!-- Connection lines between seals and center -->
<g stroke="#d97706" stroke-width=".8" opacity=".25" stroke-dasharray="6 4">
  <line x1="390" y1="450" x2="665" y2="450"/>
  <line x1="775" y1="450" x2="1050" y2="450"/>
</g>
<!-- Data exchange particles -->
<g fill="#fbbf24">
  <circle cx="450" cy="450" r="3" opacity=".5"/>
  <circle cx="520" cy="450" r="3" opacity=".4"/>
  <circle cx="590" cy="450" r="3" opacity=".5"/>
  <circle cx="850" cy="450" r="3" opacity=".5"/>
  <circle cx="920" cy="450" r="3" opacity=".4"/>
  <circle cx="990" cy="450" r="3" opacity=".5"/>
</g>
<!-- Seat indicators around table -->
<g fill="#d97706" opacity=".3">
  <rect x="400" y="530" width="30" height="8" rx="2"/>
  <rect x="480" y="545" width="30" height="8" rx="2"/>
  <rect x="560" y="555" width="30" height="8" rx="2"/>
  <rect x="850" y="555" width="30" height="8" rx="2"/>
  <rect x="930" y="545" width="30" height="8" rx="2"/>
  <rect x="1010" y="530" width="30" height="8" rx="2"/>
</g>
<!-- Ambient glow behind seals -->
<ellipse cx="300" cy="450" rx="110" ry="110" fill="#d97706" opacity=".04"/>
<ellipse cx="1140" cy="450" rx="110" ry="110" fill="#d97706" opacity=".04"/>
<ellipse cx="720" cy="450" rx="70" ry="70" fill="#fbbf24" opacity=".04"/>
<!-- Corner HUD — gold -->
<path d="M60,60 L60,30 L90,30" fill="none" stroke="#d97706" stroke-width="1.5" opacity=".5"/>
<path d="M1380,60 L1380,30 L1350,30" fill="none" stroke="#d97706" stroke-width="1.5" opacity=".5"/>
<path d="M60,840 L60,870 L90,870" fill="none" stroke="#d97706" stroke-width="1.5" opacity=".5"/>
<path d="M1380,840 L1380,870 L1350,870" fill="none" stroke="#d97706" stroke-width="1.5" opacity=".5"/>
</svg>
