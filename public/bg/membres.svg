<svg viewBox="0 0 1440 900" xmlns="http://www.w3.org/2000/svg">
<defs>
  <radialGradient id="bg" cx="50%" cy="50%" r="80%">
    <stop offset="0%" stop-color="#07100a"/>
    <stop offset="100%" stop-color="#020504"/>
  </radialGradient>
  <radialGradient id="glow" cx="50%" cy="50%" r="55%">
    <stop offset="0%" stop-color="#10b981" stop-opacity=".16"/>
    <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
  </radialGradient>
</defs>
<rect width="1440" height="900" fill="url(#bg)"/>
<rect width="1440" height="900" fill="url(#glow)"/>
<!-- Stars -->
<g fill="white" opacity=".85"><circle cx="72" cy="43" r="1.2"/><circle cx="498" cy="67" r="1.5"/><circle cx="923" cy="55" r="1.3"/><circle cx="1372" cy="48" r="1.1"/><circle cx="177" cy="145" r="1.4"/><circle cx="612" cy="138" r="1.2"/><circle cx="1055" cy="133" r="1"/><circle cx="1289" cy="118" r="1.3"/><circle cx="58" cy="224" r="1.1"/><circle cx="462" cy="238" r="1.4"/><circle cx="912" cy="229" r="1"/><circle cx="1132" cy="212" r="1.5"/><circle cx="312" cy="334" r="1.3"/><circle cx="758" cy="326" r="1.5"/><circle cx="1203" cy="329" r="1.2"/><circle cx="215" cy="28" r=".8"/><circle cx="701" cy="19" r="1"/><circle cx="1148" cy="33" r=".9"/><circle cx="387" cy="88" r="1.3"/><circle cx="842" cy="91" r="1.5"/><circle cx="130" cy="178" r="1.4"/><circle cx="1271" cy="164" r="1.5"/></g>
<!-- Node network — connections first (behind nodes) -->
<g stroke="#10b981" stroke-width=".8" opacity=".25">
  <!-- Hub to ring -->
  <line x1="720" y1="450" x2="400" y2="260"/><line x1="720" y1="450" x2="620" y2="200"/>
  <line x1="720" y1="450" x2="820" y2="200"/><line x1="720" y1="450" x2="1040" y2="260"/>
  <line x1="720" y1="450" x2="1100" y2="480"/><line x1="720" y1="450" x2="980" y2="680"/>
  <line x1="720" y1="450" x2="720" y2="720"/><line x1="720" y1="450" x2="460" y2="680"/>
  <line x1="720" y1="450" x2="340" y2="480"/>
  <!-- Ring to ring -->
  <line x1="400" y1="260" x2="620" y2="200"/><line x1="620" y1="200" x2="820" y2="200"/>
  <line x1="820" y1="200" x2="1040" y2="260"/><line x1="1040" y1="260" x2="1100" y2="480"/>
  <line x1="1100" y1="480" x2="980" y2="680"/><line x1="980" y1="680" x2="720" y2="720"/>
  <line x1="720" y1="720" x2="460" y2="680"/><line x1="460" y1="680" x2="340" y2="480"/>
  <line x1="340" y1="480" x2="400" y2="260"/>
  <!-- Outer nodes -->
  <line x1="400" y1="260" x2="220" y2="160"/><line x1="620" y1="200" x2="560" y2="80"/>
  <line x1="820" y1="200" x2="880" y2="80"/><line x1="1040" y1="260" x2="1220" y2="160"/>
  <line x1="1100" y1="480" x2="1320" y2="440"/><line x1="980" y1="680" x2="1140" y2="800"/>
  <line x1="720" y1="720" x2="720" y2="860"/><line x1="460" y1="680" x2="300" y2="800"/>
  <line x1="340" y1="480" x2="120" y2="440"/>
</g>
<!-- Outer nodes -->
<g fill="#10b981" opacity=".55">
  <circle cx="220" cy="160" r="6"/><circle cx="560" cy="80" r="5"/>
  <circle cx="880" cy="80" r="5"/><circle cx="1220" cy="160" r="6"/>
  <circle cx="1320" cy="440" r="5"/><circle cx="1140" cy="800" r="6"/>
  <circle cx="720" cy="860" r="5"/><circle cx="300" cy="800" r="6"/>
  <circle cx="120" cy="440" r="5"/>
</g>
<!-- Ring nodes -->
<g fill="#10b981" opacity=".75">
  <circle cx="400" cy="260" r="10"/><circle cx="620" cy="200" r="10"/>
  <circle cx="820" cy="200" r="10"/><circle cx="1040" cy="260" r="10"/>
  <circle cx="1100" cy="480" r="10"/><circle cx="980" cy="680" r="10"/>
  <circle cx="720" cy="720" r="10"/><circle cx="460" cy="680" r="10"/>
  <circle cx="340" cy="480" r="10"/>
</g>
<!-- Pulse rings on ring nodes -->
<g fill="none" stroke="#10b981" opacity=".2">
  <circle cx="400" cy="260" r="18"/><circle cx="820" cy="200" r="18"/>
  <circle cx="1100" cy="480" r="18"/><circle cx="720" cy="720" r="18"/>
  <circle cx="340" cy="480" r="18"/>
</g>
<!-- Central hub -->
<circle cx="720" cy="450" r="28" fill="#10b981" opacity=".6"/>
<circle cx="720" cy="450" r="40" fill="none" stroke="#10b981" stroke-width="1.5" opacity=".35"/>
<circle cx="720" cy="450" r="55" fill="none" stroke="#10b981" stroke-width=".8" opacity=".2"/>
<!-- Gold rank accent -->
<circle cx="720" cy="450" r="14" fill="#fbbf24" opacity=".5"/>
<!-- Corner HUD -->
<path d="M60,60 L60,30 L90,30" fill="none" stroke="#10b981" stroke-width="1.5" opacity=".5"/>
<path d="M1380,60 L1380,30 L1350,30" fill="none" stroke="#10b981" stroke-width="1.5" opacity=".5"/>
<path d="M60,840 L60,870 L90,870" fill="none" stroke="#10b981" stroke-width="1.5" opacity=".5"/>
<path d="M1380,840 L1380,870 L1350,870" fill="none" stroke="#10b981" stroke-width="1.5" opacity=".5"/>
</svg>
