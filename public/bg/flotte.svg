<ellipse cx="720" cy="720" rx="280" ry="60" fill="url(#pad)"/>
<ellipse cx="720" cy="720" rx="280" ry="60" fill="none" stroke="#3b82f6" stroke-width="2" opacity=".5"/>
<ellipse cx="720" cy="720" rx="220" ry="47" fill="none" stroke="#3b82f6" stroke-width="1" opacity=".35"/>
<ellipse cx="720" cy="720" rx="160" ry="34" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity=".4"/>
<ellipse cx="720" cy="720" rx="80" ry="17" fill="none" stroke="#60a5fa" stroke-width="1.5" opacity=".55"/>
<!-- Landing pad cross -->
<line x1="440" y1="720" x2="1000" y2="720" stroke="#3b82f6" stroke-width=".8" opacity=".4"/>
<line x1="720" y1="660" x2="720" y2="780" stroke="#3b82f6" stroke-width=".8" opacity=".4"/>
<!-- Runway lights left -->
<g fill="#60a5fa" opacity=".7">
  <circle cx="130" cy="730" r="4"/><circle cx="180" cy="726" r="4"/><circle cx="230" cy="722" r="4"/>
  <circle cx="280" cy="719" r="4"/><circle cx="330" cy="718" r="4"/><circle cx="380" cy="718" r="4"/>
  <circle cx="430" cy="718" r="4"/><circle cx="480" cy="719" r="3"/>
</g>
<!-- Runway lights right -->
<g fill="#60a5fa" opacity=".7">
  <circle cx="960" cy="719" r="3"/><circle cx="1010" cy="718" r="4"/><circle cx="1060" cy="718" r="4"/>
  <circle cx="1110" cy="718" r="4"/><circle cx="1160" cy="719" r="4"/><circle cx="1210" cy="722" r="4"/>
  <circle cx="1260" cy="726" r="4"/><circle cx="1310" cy="730" r="4"/>
</g>
<!-- Ship silhouette center -->
<ellipse cx="720" cy="560" rx="110" ry="28" fill="#0a1628" opacity=".9"/>
<polygon points="720,490 780,580 660,580" fill="#0c1c30" opacity=".85"/>
<ellipse cx="720" cy="580" rx="130" ry="18" fill="#0c1c30" opacity=".8"/>
<rect x="690" y="490" width="60" height="12" fill="#0c1c30" opacity=".7"/>
<!-- Engine glow -->
<ellipse cx="670" cy="578" rx="18" ry="8" fill="#3b82f6" opacity=".4"/>
<ellipse cx="770" cy="578" rx="18" ry="8" fill="#3b82f6" opacity=".4"/>
<!-- Tech lines on walls -->
<g stroke="#1d4ed8" stroke-width=".5" opacity=".2">
  <line x1="20" y1="220" x2="20" y2="860"/><line x1="40" y1="220" x2="40" y2="860"/>
  <line x1="60" y1="220" x2="60" y2="860"/><line x1="80" y1="220" x2="80" y2="860"/>
  <line x1="1360" y1="220" x2="1360" y2="860"/><line x1="1380" y1="220" x2="1380" y2="860"/>
  <line x1="1400" y1="220" x2="1400" y2="860"/><line x1="1420" y1="220" x2="1420" y2="860"/>
