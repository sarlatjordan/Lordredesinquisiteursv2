<svg viewBox="0 0 1440 900" xmlns="http://www.w3.org/2000/svg">
<defs>
  <radialGradient id="bg" cx="50%" cy="70%" r="80%">
    <stop offset="0%" stop-color="#060e1c"/>
    <stop offset="100%" stop-color="#020508"/>
  </radialGradient>
  <radialGradient id="glow" cx="50%" cy="75%" r="55%">
    <stop offset="0%" stop-color="#3b82f6" stop-opacity=".22"/>
    <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="pad" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#1e40af" stop-opacity=".3"/>
    <stop offset="70%" stop-color="#1e3a8a" stop-opacity=".1"/>
    <stop offset="100%" stop-color="#1e3a8a" stop-opacity="0"/>
  </radialGradient>
</defs>
<rect width="1440" height="900" fill="url(#bg)"/>
<rect width="1440" height="900" fill="url(#glow)"/>
<!-- Stars through open bay -->
<g fill="white" opacity=".88"><circle cx="72" cy="43" r="1.2"/><circle cx="498" cy="67" r="1.5"/><circle cx="923" cy="55" r="1.3"/><circle cx="1372" cy="48" r="1.1"/><circle cx="177" cy="145" r="1.4"/><circle cx="612" cy="138" r="1.2"/><circle cx="1055" cy="133" r="1"/><circle cx="1289" cy="118" r="1.3"/><circle cx="58" cy="224" r="1.1"/><circle cx="462" cy="238" r="1.4"/><circle cx="912" cy="229" r="1"/><circle cx="1132" cy="212" r="1.5"/><circle cx="312" cy="334" r="1.3"/><circle cx="758" cy="326" r="1.5"/><circle cx="1203" cy="329" r="1.2"/><circle cx="215" cy="28" r=".8"/><circle cx="701" cy="19" r="1"/><circle cx="1148" cy="33" r=".9"/><circle cx="387" cy="88" r="1.3"/><circle cx="842" cy="91" r="1.5"/><circle cx="1296" cy="89" r=".9"/><circle cx="130" cy="178" r="1.4"/><circle cx="586" cy="181" r=".9"/><circle cx="1271" cy="164" r="1.5"/></g>
<!-- Hangar ceiling structure -->
<rect x="0" y="0" width="1440" height="180" fill="#08101e" opacity=".95"/>
<line x1="0" y1="180" x2="1440" y2="180" stroke="#3b82f6" stroke-width="1" opacity=".3"/>
<!-- Ceiling ribs -->
<g stroke="#0f1e35" stroke-width="12" opacity=".9">
  <line x1="0" y1="0" x2="0" y2="180"/><line x1="160" y1="0" x2="160" y2="180"/>
  <line x1="320" y1="0" x2="320" y2="180"/><line x1="480" y1="0" x2="480" y2="180"/>
  <line x1="640" y1="0" x2="640" y2="180"/><line x1="800" y1="0" x2="800" y2="180"/>
  <line x1="960" y1="0" x2="960" y2="180"/><line x1="1120" y1="0" x2="1120" y2="180"/>
  <line x1="1280" y1="0" x2="1280" y2="180"/><line x1="1440" y1="0" x2="1440" y2="180"/>
</g>
<!-- Hangar side walls -->
<rect x="0" y="0" width="100" height="900" fill="#07101e" opacity=".97"/>
<rect x="1340" y="0" width="100" height="900" fill="#07101e" opacity=".97"/>
<line x1="100" y1="0" x2="100" y2="900" stroke="#3b82f6" stroke-width="1" opacity=".25"/>
<line x1="1340" y1="0" x2="1340" y2="900" stroke="#3b82f6" stroke-width="1" opacity=".25"/>
